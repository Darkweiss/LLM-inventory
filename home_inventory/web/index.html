<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Home Inventory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid #1e2130;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a0a8c0;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #box-header {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e8eaf0;
      margin-top: 4px;
    }

    #status {
      font-size: 0.8rem;
      color: #5a6080;
      padding: 8px 24px;
      border-bottom: 1px solid #1e2130;
    }

    #status.listening { color: #4ade80; }
    #status.thinking  { color: #60a5fa; }
    #status.error     { color: #f87171; }

    #box-contents {
      margin: 16px 24px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e2130;
      display: none;
    }

    #box-contents table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    #box-contents th {
      background: #1a1d2e;
      color: #6b7280;
      text-align: left;
      padding: 10px 14px;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #box-contents td {
      padding: 10px 14px;
      border-top: 1px solid #1e2130;
      color: #c8ccd8;
    }

    #box-contents tr:hover td { background: #13161f; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
    }

    #answer-area {
      flex: 1;
      background: #13161f;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #1e2130;
      min-height: 120px;
      display: flex;
      align-items: flex-start;
    }

    #answer {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #e8eaf0;
    }

    #answer.placeholder { color: #3a3f55; font-style: italic; }

    #transcript {
      font-size: 0.85rem;
      color: #4a5070;
      min-height: 20px;
      font-style: italic;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #question-input {
      flex: 1;
      background: #13161f;
      border: 1px solid #2a2f45;
      border-radius: 10px;
      color: #e8eaf0;
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    #question-input:focus { border-color: #4361ee; }
    #question-input::placeholder { color: #3a3f55; }

    #send-btn {
      background: #4361ee;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #3451d1; }
    #send-btn:disabled { background: #2a2f45; color: #4a5070; cursor: default; }

    #mic-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #1e2233;
      color: #6b7280;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    #mic-btn:hover { background: #252840; color: #a0a8c0; }
    #mic-btn.listening { background: #4ade8022; color: #4ade80; animation: pulse 1.2s infinite; }
    #mic-btn.hidden { display: none; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #4ade8044; }
      50% { box-shadow: 0 0 0 8px #4ade8000; }
    }

    #add-item-section {
      margin: 0 24px 16px;
    }

    #add-item-btn {
      background: #1e2233;
      color: #a0a8c0;
      border: 1px solid #2a2f45;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #add-item-btn:hover { background: #252840; color: #e8eaf0; }

    #add-item-form {
      background: #13161f;
      border: 1px solid #2a2f45;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #add-item-form input {
      background: #0f1117;
      border: 1px solid #2a2f45;
      border-radius: 8px;
      color: #e8eaf0;
      font-size: 0.95rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    #add-item-form input:focus { border-color: #4361ee; }
    #add-item-form input::placeholder { color: #3a3f55; }

    .add-form-header {
      font-size: 1rem;
      font-weight: 600;
      color: #e8eaf0;
      margin-bottom: 4px;
    }

    #add-form-buttons {
      display: flex;
      gap: 10px;
    }

    #add-save-btn {
      background: #4361ee;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
    }

    #add-save-btn:hover { background: #3451d1; }
    #add-save-btn:disabled { background: #2a2f45; color: #4a5070; cursor: default; }

    #add-cancel-btn {
      background: transparent;
      border: 1px solid #2a2f45;
      border-radius: 8px;
      color: #a0a8c0;
      font-size: 0.9rem;
      padding: 10px 18px;
      cursor: pointer;
    }

    #add-cancel-btn:hover { background: #1e2233; }

    #add-status {
      font-size: 0.85rem;
      color: #5a6080;
      min-height: 18px;
      margin-top: 4px;
    }

    #add-status.success { color: #4ade80; }
    #add-status.error   { color: #f87171; }
  </style>
</head>
<body>

<header>
  <h1>Home Inventory</h1>
  <div id="box-header"></div>
</header>

<div id="status">Loading inventory…</div>

<div id="box-contents">
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Category</th>
        <th>Qty</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="box-table-body"></tbody>
  </table>
</div>

<div id="add-item-section">
  <button id="add-item-btn">+ Add item</button>
  <form id="add-item-form" hidden>
    <div class="add-form-header">Add a new item</div>
    <input id="add-box-input"   type="number" placeholder="Box ID"             inputmode="numeric" required>
    <input id="add-name-input"  type="text"   placeholder="Item name"                              required>
    <input id="add-qty-input"   type="number" placeholder="Quantity (optional)" inputmode="numeric" min="0">
    <input id="add-notes-input" type="text"   placeholder="Notes (optional)">
    <div id="add-form-buttons">
      <button type="submit" id="add-save-btn">Save</button>
      <button type="button" id="add-cancel-btn">Cancel</button>
    </div>
    <div id="add-status"></div>
  </form>
</div>

<main>
  <div id="answer-area">
    <div id="answer" class="placeholder">Ask a question to get started…</div>
  </div>

  <div id="transcript"></div>

  <div id="input-row">
    <button id="mic-btn" title="Voice input">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <input id="question-input" type="text" placeholder="Where is the…" autocomplete="off">
    <button id="send-btn">Ask</button>
  </div>
</main>

<script>

  const statusEl    = document.getElementById('status');
  const answerEl    = document.getElementById('answer');
  const transcriptEl = document.getElementById('transcript');
  const micBtn      = document.getElementById('mic-btn');
  const sendBtn     = document.getElementById('send-btn');
  const inputEl     = document.getElementById('question-input');
  const boxHeader   = document.getElementById('box-header');
  const boxContents = document.getElementById('box-contents');
  const boxTableBody = document.getElementById('box-table-body');

  const addBtn       = document.getElementById('add-item-btn');
  const addForm      = document.getElementById('add-item-form');
  const addBoxInput  = document.getElementById('add-box-input');
  const addNameInput = document.getElementById('add-name-input');
  const addQtyInput  = document.getElementById('add-qty-input');
  const addNotesInput = document.getElementById('add-notes-input');
  const addSaveBtn   = document.getElementById('add-save-btn');
  const addCancelBtn = document.getElementById('add-cancel-btn');
  const addStatusEl  = document.getElementById('add-status');

  const params     = new URLSearchParams(window.location.search);
  const currentBox = params.get('box') || null;

  let inventoryData = null;
  let recognition   = null;
  let isListening   = false;

  // ── Inventory fetch ──────────────────────────────────────────────────────

  async function fetchInventory() {
    setStatus('Loading inventory…', '');
    try {
      const res  = await fetch('api/inventory');
      inventoryData = await res.json();
      if (currentBox) renderBoxContents(currentBox);
      setStatus('Ready', '');
      sendBtn.disabled = false;
    } catch (err) {
      setStatus('Failed to load inventory', 'error');
    }
  }

  function renderBoxContents(boxId) {
    const boxMeta = inventoryData.boxes.find(b => String(b['Box ID']) === String(boxId));
    const items   = inventoryData.inventory.filter(i => String(i['Box ID']) === String(boxId));

    boxHeader.textContent = boxMeta
      ? `${boxMeta['Box ID']} — ${boxMeta['Box Name']}${boxMeta['Location'] ? ' · ' + boxMeta['Location'] : ''}`
      : `Box ${boxId}`;

    boxTableBody.innerHTML = items.length
      ? items.map(i => `
          <tr>
            <td>${i['Item Name'] || '—'}</td>
            <td>${i['Category'] || '—'}</td>
            <td>${i['Quantity'] || '—'}</td>
            <td>${i['Notes'] || ''}</td>
          </tr>`).join('')
      : '<tr><td colspan="4" style="color:#4a5070;font-style:italic">No items recorded for this box</td></tr>';

    boxContents.style.display = 'block';
  }

  // ── Claude query ─────────────────────────────────────────────────────────

  async function askClaude(question) {
    setStatus('Thinking…', 'thinking');
    sendBtn.disabled = true;

    try {
      const res  = await fetch('api/ask', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ question, box: currentBox })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      displayAndSpeak(data.answer);
      setStatus('Ready', '');
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    } finally {
      sendBtn.disabled = false;
    }
  }

  function displayAndSpeak(text) {
    answerEl.textContent = text;
    answerEl.classList.remove('placeholder');

    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';

    const doSpeak = () => speechSynthesis.speak(utt);
    if (speechSynthesis.getVoices().length === 0) {
      speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
    } else {
      doSpeak();
    }
  }

  // ── Voice input ──────────────────────────────────────────────────────────

  function initSpeech() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { micBtn.classList.add('hidden'); return; }

    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      inputEl.value = transcript;
      transcriptEl.textContent = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        stopListening();
        askClaude(transcript);
      }
    };

    recognition.onerror = (e) => {
      stopListening();
      setStatus('Mic error: ' + e.error, 'error');
    };

    recognition.onend = () => stopListening();
  }

  function startListening() {
    if (!recognition || isListening) return;
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
    setStatus('Listening…', 'listening');
    transcriptEl.textContent = '';
  }

  function stopListening() {
    if (!isListening) return;
    isListening = false;
    micBtn.classList.remove('listening');
    if (inventoryData) setStatus('Ready', '');
  }

  // ── Wiring ───────────────────────────────────────────────────────────────

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  micBtn.addEventListener('click', () => {
    if (isListening) { recognition.stop(); return; }
    startListening();
  });

  sendBtn.addEventListener('click', () => {
    const q = inputEl.value.trim();
    if (q) { askClaude(q); inputEl.value = ''; }
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const q = inputEl.value.trim();
      if (q) { askClaude(q); inputEl.value = ''; }
    }
  });

  // ── Add item ─────────────────────────────────────────────────────────────

  function openAddForm() {
    addForm.hidden = false;
    addBtn.hidden  = true;
    if (currentBox) addBoxInput.value = currentBox;
    addForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
    addNameInput.focus();
  }

  function closeAddForm() {
    addForm.hidden = true;
    addBtn.hidden  = false;
    addStatusEl.textContent = '';
    addStatusEl.className   = '';
    addNameInput.value  = '';
    addQtyInput.value   = '';
    addNotesInput.value = '';
  }

  async function submitAdd(e) {
    e.preventDefault();
    const box      = addBoxInput.value.trim();
    const itemName = addNameInput.value.trim();
    const qty      = addQtyInput.value.trim();
    const notes    = addNotesInput.value.trim();
    if (!box || !itemName) return;

    addSaveBtn.disabled = true;
    addStatusEl.textContent = 'Saving…';
    addStatusEl.className   = '';

    try {
      const res  = await fetch('api/add-item', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          box: Number(box),
          item_name: itemName,
          quantity: qty === '' ? '' : Number(qty),
          notes,
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Save failed');

      addStatusEl.textContent = `Added "${itemName}" to box ${box}`;
      addStatusEl.className   = 'success';
      addNameInput.value  = '';
      addQtyInput.value   = '';
      addNotesInput.value = '';
      addNameInput.focus();

      await fetchInventory();
    } catch (err) {
      addStatusEl.textContent = 'Error: ' + err.message;
      addStatusEl.className   = 'error';
    } finally {
      addSaveBtn.disabled = false;
    }
  }

  addBtn.addEventListener('click', openAddForm);
  addCancelBtn.addEventListener('click', closeAddForm);
  addForm.addEventListener('submit', submitAdd);

  sendBtn.disabled = true;
  initSpeech();
  fetchInventory();
</script>
</body>
</html>
